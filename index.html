
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<style>
body{

}

button:hover{
background:#16a34a;
}

.price{
font-size:28px;
color:#22c55e;
margin:20px;
}
</style>
</head>

<body>

<header>
<h1>Smart Code Dictionary</h1>
<p>قاموس برمجي يساعدك تتعلم المصطلحات بسهولة</p>
</header>

<div class="container">

<div class="box">💻 أمثلة كود لكل مصطلح</div>
<div class="box">🧠 اختبار تفاعلي</div>

</div>

window.location.href = "mailto:badreaam1@gmail.com";

<h2 style="text-align:center;color:white;">🔥 جرّب القاموس قبل الشراء</h2>

<div style="text-align:center;margin-top:20px;">

<input id="search" placeholder="اكتب مصطلح مثل API"
style="padding:10px;width:70%;font-size:18px;border-radius:8px;border:none;">

<br><br>

<button onclick="searchTerm()" style="padding:10px 20px;">
بحث
</button>

<br><br>

<button onclick="quick('api')">API</button>
<button onclick="quick('firewall')">Firewall</button>
<button onclick="quick('array')">Array</button>

<div id="result" style="margin-top:20px;font-size:20px;color:#22c55e;"></div>

<br><br>

<a href="mailto:youremail@gmail.com">
<button style="background:#22c55e;padding:15px 30px;font-size:20px;">
اشتر الآن بعد التجربة 💰
</button>
</a>

</div>

<script>
function searchTerm(){
let input = document.getElementById("search").value.toLowerCase();

let data = {
"api": "API: وسيلة ربط بين الأنظمة",
"firewall": "Firewall: جدار حماية للشبكات",
"array": "Array: تخزين مجموعة بيانات"
};

document.getElementById("result").innerText =
data[input] || "غير موجود حالياً";
}

function quick(word){
document.getElementById("search").value = word;
searchTerm();
}
</script>
