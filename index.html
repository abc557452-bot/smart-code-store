
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Code Store</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
background:#1e293b;
padding:40px;
}

.container{
padding:40px;
max-width:800px;
margin:auto;
}

.box{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:15px 30px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.price{
font-size:28px;
color:#22c55e;
margin:20px;
}
</style>
</head>

<body>

<header>
<h1>🔥 جرّب القاموس قبل الشراء</h1>

<input id="search" placeholder="اكتب API أو Firewall"
style="padding:10px;width:70%;font-size:18px;">

<br><br>

<button onclick="searchTerm()">بحث</button>

<div id="result" style="margin-top:20px;font-size:20px;color:#22c55e;"></div>

<hr>

<h2>💰 شراء المنتج</h2>

<p>قاموس برمجي مع أمثلة + شرح + اختبار</p>

<a href="mailto:youremail@gmail.com">
<button style="padding:15px 30px;font-size:18px;background:#22c55e;border:none;">
اشتر الآن
</button>
</a>

<script>
function searchTerm(){
let input = document.getElementById("search").value.toLowerCase();

let data = {
"api": "API: وسيلة ربط بين الأنظمة",
"firewall": "Firewall: جدار حماية للشبكات",
"array": "Array: تخزين بيانات متعددة"
};

document.getElementById("result").innerText =
data[input] || "غير موجود حالياً";
}
</script>

</body>
</html>
